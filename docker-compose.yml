version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mastermind
      POSTGRES_PASSWORD: mastermind_password
      POSTGRES_DB: mastermind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mastermind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://mastermind:mastermind_password@postgres:5432/mastermind_db
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      DEBUG: false
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Angular) - optional, build separately
  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "4200:4200"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
